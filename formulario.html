<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidaPro | Hábitos Saludables</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="hero">
        <nav class="navbar">
            <h1 class="logo">VidaPro</h1>
            <ul class="menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>

    </header>

 <main>
    <section class="formulario">
        <h2>Ingresa tu información</h2>

        <form>
            
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" required>

            <label for="correo">Correo Electrónico:</label>
            <input type="email" id="correo" required>

            <label for="frecuencia">Frecuencia con la que deseas mantener tu hábito:</label>
            <select id="frecuencia">
                <option>Diario</option>
                <option>Semanal</option>
                <option>Mensual</option>
            </select>

            <button type="submit">Guardar</button>
        </form>
    </section>
</main>

    <footer id="contacto">
        <div class="footer-contenido">
            <h2>VidaPro</h2>
            <p>Plataforma enfocada en bienestar, disciplina y crecimiento personal.</p>
            <p>Email: contacto@vidapro.com</p>
            <p>Tel: +57 300 000 0000</p>
        </div>
    </footer>

</body>
</html>
