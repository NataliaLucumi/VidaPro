<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidaPro | Hábitos Saludables</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>


        <nav class="navbar-vidapro">
            <div class="nav-container">
                <a href="#" class="logo">VidaPro</a>
                <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </div>
        </nav>


 <main>
        <section id="registro" class="form-container-section">
        <div class="form-card">
            <h2 class="form-title">Ingresa tu información</h2>
            
            <form class="custom-form">
            <div class="field-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" placeholder="Escribe tu nombre">
            </div>

            <div class="field-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" placeholder="ejemplo@correo.com">
            </div>

            <div class="field-group">
                <label for="frecuencia">Frecuencia con la que deseas mantener tu hábito:</label>
                <div class="select-wrapper">
                <select id="frecuencia">
                    <option value="diario">Diario</option>
                    <option value="semanal">Semanal</option>
                    <option value="mensual">Mensual</option>
                </select>
                </div>
            </div>

            <button type="submit" class="btn-guardar">Guardar información</button>
            </form>
        </div>
        </section>
</main>

   <footer class="main-footer" id="contacto">
    <h2 class="footer-logo">VidaPro</h2>
    <p class="footer-tagline">Plataforma enfocada en bienestar, disciplina y crecimiento personal.</p>
  </footer>

</body>
</html>
